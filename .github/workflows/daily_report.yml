name: Culture Discovery
on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Quốc gia (vd: vietnam, japan, india) — bỏ trống = random'
        required: false
        type: string
      print_only:
        description: 'Chỉ in ra log, không gửi Discord'
        required: false
        type: boolean
        default: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python bot.py ${{ inputs.country }} ${{ inputs.print_only && '--print' || '' }}
        env:
          SMITHSONIAN_API_KEY: ${{ secrets.SMITHSONIAN_API_KEY }}
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
